name: Deploy Cloudflare Workers

inputs:
  article_data_path:
    required: true
    type: string
  user_data_path:
    required: true
    type: string
  build_data_path:
    required: true
    type: string
  wrangler_account_id:
    required: true
    type: string
  wrangler_name:
    required: true
    type: string
  wrangler_url:
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - run: echo ${{ github.action_path }}
      shell: bash
    - run: pwd
      shell: bash
    - run: ls -a
      shell: bash

    - name: Copy articles
      shell: bash
      run: |
        mkdir -p src/pages/raw__/articles
        cp -r "${{ inputs.article_data_path }}"/* src/pages/raw__/articles/

    - name: Copy users
      shell: bash
      run: |
        mkdir -p src/pages/raw__/users
        cp -r "${{ inputs.user_data_path }}"/* src/pages/raw__/users/

    - name: Enable corepack
      shell: bash
      run: corepack enable

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install Node dependencies
      shell: bash
      run: pnpm install

    - name: Build site
      shell: bash
      run: pnpm run build

    - name: Merge prebuilt and new build artifacts
      shell: bash
      run: |
        rm -rf crates/cloudflare_workers/public
        mkdir -p crates/cloudflare_workers/public
        rsync -a "${{ inputs.build_data_path }}/" crates/cloudflare_workers/public/
        rsync -a dist/ crates/cloudflare_workers/public/

    - name: Configure wrangler
      shell: bash
      run: |
        sed -i "s/^name = .*/name = '${{ inputs.wrangler_name }}'/" crates/cloudflare_workers/wrangler.toml
        if grep -q '^account_id' crates/cloudflare_workers/wrangler.toml; then
          sed -i "s/^account_id.*$/account_id = '${{ inputs.wrangler_account_id }}'/" crates/cloudflare_workers/wrangler.toml
        else
          echo "account_id = '${{ inputs.wrangler_account_id }}'" >> crates/cloudflare_workers/wrangler.toml
        fi
        sed -i "s|^URL = .*|URL = '${{ inputs.wrangler_url }}'|" crates/cloudflare_workers/wrangler.toml

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Deploy to Cloudflare Workers
      uses: cloudflare/wrangler-action@v3
      with:
        workingDirectory: crates/cloudflare_workers
        command: deploy
