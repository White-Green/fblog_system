name: Deploy Cloudflare Workers

inputs:
  working_dir:
    required: true
    type: string
  article_data_path:
    required: true
    type: string
  user_data_path:
    required: true
    type: string
  build_data_path:
    required: true
    type: string
  wrangler_account_id:
    required: true
    type: string
  wrangler_name:
    required: true
    type: string
  wrangler_url:
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - run: pwd
      working-directory: ${{ inputs.working_dir }}
      shell: bash

    - name: Copy articles
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        mkdir -p articles
        cp -r ${{ inputs.article_data_path }}/* articles/

    - name: Copy users
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        mkdir -p users
        cp -r ${{ inputs.user_data_path }}/* users/

    - shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: tree -a

    - name: Enable corepack
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: corepack enable

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install Node dependencies
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: pnpm install

    - name: Build site
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: pnpm run build

    - name: Merge prebuilt and new build artifacts
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        rm -rf crates/cloudflare_workers/public
        mkdir -p crates/cloudflare_workers/public
        rsync -a "${{ inputs.build_data_path }}/" crates/cloudflare_workers/public/
        rsync -a dist/ crates/cloudflare_workers/public/

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Deploy to Cloudflare Workers
      uses: cloudflare/wrangler-action@v3
      with:
        workingDirectory: crates/cloudflare_workers
        command: deploy
