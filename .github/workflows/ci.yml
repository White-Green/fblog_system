name: CI

on:
  push:

env:
  GHALINT_VERSION: v1.5.6

jobs:
  github-actions-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Install ghalint
        run: go install "github.com/suzuki-shunsuke/ghalint/cmd/ghalint@${GHALINT_VERSION}"

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12 # zizmor: ignore[unpinned-images] Docker action is pinned to the requested tag.
        with:
          args: -color

      - name: Run zizmor
        if: ${{ !cancelled() }}
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          version: 1.25.2

      - name: Run ghalint
        if: ${{ !cancelled() }}
        run: ghalint run
        env:
          GHALINT_LOG_COLOR: always
          GITHUB_TOKEN: ${{ github.token }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses] Channel refs select the requested Rust toolchain.

      - id: worker_build
        name: Load worker-build version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -er '.metadata["cargo-binaries"]["worker-build"]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-', runner.os) }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-test-', runner.os) }}

      - id: worker_build_binary_cache
        name: Restore worker-build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          key: fblog_system-cargo_install-worker-build-${{ steps.worker_build.outputs.version }}
          path: ~/.cargo/bin/worker-build

      - name: Install worker-build
        if: steps.worker_build_binary_cache.outputs.cache-hit != 'true'
        run: cargo install --locked "worker-build@${WORKER_BUILD_VERSION}" --force
        env:
          WORKER_BUILD_VERSION: ${{ steps.worker_build.outputs.version }}

      - run: cargo fetch --locked

      - name: Start caddy
        run: docker compose -f test_config/compose.yml up -d caddy

      - name: Setup test data
        run: |
          mv test_config/test_data/e2e_test/* .
          mv test_config/test_data/cloudflare_workers crates/cloudflare_workers/public
          tree crates/cloudflare_workers

      - name: Fix certificate permissions
        run: |
          sleep 10
          sudo chown -R "$(id -u):$(id -g)" test_config/caddy-data
          sudo chmod -R a+rX test_config/caddy-data

      - name: Build site
        run: pnpm run build
        env:
          PUBLIC_KEY_FILE: test_config/public-key-for-test.pem
          SITE_URL: https://blog.test

      - name: Run tests
        run: cargo test --locked --workspace
        env:
          RUST_BACKTRACE: full

      - name: Stop caddy
        if: always()
        run: docker compose -f test_config/compose.yml down

      - name: Upload logs as artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-test-logs
          path: logs/
          retention-days: 7

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Enable corepack
        run: corepack enable

      - name: Start caddy
        run: docker compose -f test_config/compose.yml up -d caddy

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses] Channel refs select the requested Rust toolchain.
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-', runner.os) }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-clippy-', runner.os) }}

      - run: cargo fetch --locked

      - name: Setup test data
        run: mv test_config/test_data/e2e_test/* .

      - name: Build site
        run: pnpm run build
        env:
          PUBLIC_KEY_FILE: test_config/public-key-for-test.pem
          SITE_URL: https://blog.test

      - name: Fix certificate permissions
        run: |
          sudo chown -R "$(id -u):$(id -g)" test_config/caddy-data
          sudo chmod -R a+rX test_config/caddy-data

      - name: cargo clippy
        run: cargo clippy --locked --workspace --tests -- -D warnings

      - name: Stop caddy
        if: always()
        run: docker compose -f test_config/compose.yml down

  cloudflare_wasm_build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses] Channel refs select the requested Rust toolchain.
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-', runner.os) }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            target
          key: ${{ runner.os }}-cargo-cloudflare-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ github.ref_name != github.event.repository.default_branch && format('{0}-cargo-cloudflare-', runner.os) }}

      - run: cargo fetch --locked

      - name: Build Cloudflare Workers frontend
        run: cargo build --locked -p fblog_system_frontend_cloudflare_workers --target=wasm32-unknown-unknown

      - name: Build Cloudflare Workers frontend for preview
        run: cargo build --locked -p fblog_system_frontend_cloudflare_workers --target=wasm32-unknown-unknown --no-default-features --features=preview

  rustfmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@nightly # zizmor: ignore[unpinned-uses] Channel refs select the requested Rust toolchain.
        with:
          components: rustfmt

      - name: cargo fmt
        run: cargo +nightly fmt --check --all

  taplo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses] Channel refs select the requested Rust toolchain.

      - id: taplo_cli
        name: Load taplo-cli version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -er '.metadata["cargo-binaries"]["taplo-cli"]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - id: taplo-cache
        name: Restore taplo-cli cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cargo/bin/taplo
          key: ${{ runner.os }}-taplo-cli-${{ steps.taplo_cli.outputs.version }}

      - name: install taplo-cli
        if: steps.taplo-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --locked "taplo-cli@${TAPLO_CLI_VERSION}" --force
        env:
          TAPLO_CLI_VERSION: ${{ steps.taplo_cli.outputs.version }}

      - name: taplo fmt
        run: ~/.cargo/bin/taplo fmt --check
